title: Web Solidaria
icon: settings

tabs:
  # 1. GESTIÓN DE PÁGINAS
  content:
    label: Contenido
    icon: text
    columns:
      main:
        width: 1/1
        sections:
          main_structure:
            type: pages
            headline: Estructura principal
            status: all
            templates:
              - home
              - services
              - calendar
              - collaborate
              - about
              - contact
          system_pages:
            type: pages
            headline: Páginas secundarias
            status: listed
            templates:
              - error
              - legal

  # 2. AJUSTES GENERALES
  settings:
    label: Ajustes Generales
    icon: cog
    columns:
      # PANTALLA: Identidad y Contacto Global
      main:
        width: 1/2
        fields:
          logo:
            label: Logo del Sitio
            type: files
            multiple: false
            layout: cards
            size: small
          favicon:
            label: Favicon
            type: files
            info: "📐 Dimensiones recomendadas: 512x512px (cuadrado)."
            multiple: false
            layout: cards
            size: small
          brand_name:
            label: Nombre de marca (Si no hay logo)
            type: text
      
      # PANTALLA: Footer y Redes
      sidebar:
        width: 1/2
        fields:
          social:
            label: Redes Sociales
            type: structure
            fields:
              platform:
                label: Red
                type: select
                options:
                  instagram: Instagram
                  facebook: Facebook
                  twitter: Twitter/X
                  linkedin: LinkedIn
                  youtube: YouTube
              url:
                label: URL
                type: url
          
          footer_text:
            label: Texto Legal / Copyright
            type: textarea
            size: small
            buttons: false

  # 4. SEO GLOBAL
  seo: seo/site
