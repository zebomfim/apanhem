title: Web Solidaria
icon: settings

tabs:
  # 1. GESTIÓN DE PÁGINAS
  content:
    label: Contenido
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          paginas_singulares:
            type: pages
            headline: Estructura Principal
            status: all
            templates:
              - home
              - quienes-somos
              - contacto
              - colabora
      sidebar:
        width: 1/3
        sections:
          directorios:
            type: pages
            headline: Directorios
            status: all
            templates:
              - actualidad
              - que-hacemos
              - calendario

  # 2. IDENTIDAD Y GLOBAL (Header/Footer)
  global:
    label: Global
    icon: world
    columns:
      # PANTALLA: Lo que se ve arriba y abajo
      header:
        width: 1/2
        fields:
          logo:
            label: Logo del Sitio
            type: files
            multiple: false
            layout: cards
            size: small
          brand_name:
            label: Nombre de marca (Si no hay logo)
            type: text
            width: 1/2
      
      footer:
        width: 1/2
        fields:
          social:
            label: Redes Sociales
            type: structure
            fields:
              platform:
                label: Red
                type: select
                options:
                  instagram: Instagram
                  facebook: Facebook
                  twitter: Twitter/X
                  linkedin: LinkedIn
                  youtube: YouTube
              url:
                label: URL
                type: url
          
          footer_text:
            label: Texto Legal / Copyright
            type: textarea
            size: small
            buttons: false

  # 3. CONTACTO Y AJUSTES
  settings:
    label: Ajustes
    icon: cog
    columns:
      main:
        width: 2/3
        fields:
          # Datos que se heredan si no se definen en páginas individuales
          email_global:
            label: Email de envíos (SMTP)
            type: email
          telefono_global:
            label: Teléfono general
            type: tel
      sidebar:
        width: 1/3
        sections:
          seo:
            type: fields
            fields:
              seo_info:
                type: info
                text: El SEO se gestiona por página y de forma global en su pestaña dedicada.

  # 4. SEO GLOBAL
  seo: seo/site
