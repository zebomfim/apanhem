title: Proyecto / Servicio
icon: cube

status:
  draft:
    label: Borrador
    text: El proyecto aún no existe en la web.
  listed:
    label: Publicado
    text: El proyecto es visible en "Qué hacemos".

columns:
  main:
    width: 2/3
    fields:
      resume:
        label: Resumen corto (Para tarjetas en listados)
        type: textarea
        buttons: false
        size: small
        maxlength: 150
      
      # Estructura principal flexible
      layout:
        label: Contenido Extendido
        type: layout
        layouts:
          - "1/1"
          - "1/2, 1/2"
          - "2/3, 1/3"
        fieldsets:
          - text
          - heading
          - image
          - html
          - card

  sidebar:
    width: 1/3
    fields:
      cover:
        label: Imagen de Portada
        type: files
        multiple: false
        layout: cards
        size: small
        template: image
      
      # Campos estandarizados opcionales
      responsable:
        label: Responsable / Contacto del servicio
        type: text
      
      fecha_inicio:
        label: Fecha de inicio del programa (Opcional)
        type: date
