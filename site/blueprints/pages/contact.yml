title: Contacto
icon: email

status:
  draft:
    label: Borrador
  listed:
    label: Publicado

tabs:
  # 1. DATOS DE CONTACTO
  content:
    label: Contenido
    icon: text
    columns:
      main:
        width: 2/3
        fields:
          headline:
            label: Titular de la página
            type: text
          layout:
            label: Bloques adicionales
            type: layout
            layouts:
              - "1/1"
            fieldsets:
              - text
              - image

      sidebar:
        width: 1/3
        fields:
          contact_details:
            label: Información de contacto
            type: group
            fields:
              direccion:
                label: Dirección
                type: textarea
                size: small
              telefono:
                label: Teléfono
                type: tel
              email:
                label: Email
                type: email
              horario:
                label: Horario
                type: textarea
                size: small
          google_maps:
            label: Google Maps URL
            type: url

  # 2. SEO
  seo: seo/page
