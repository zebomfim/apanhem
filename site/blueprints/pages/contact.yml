title: Contacto
icon: email

status:
  draft:
    label: Borrador
  listed:
    label: Publicado

tabs:
  # 1. CONTENIDO
  content:
    label: Contenido
    icon: text
    fields:
      hero: fields/hero

      intro_headline:
        label: Introducción
        type: headline

      intro_text:
        label: Texto introductorio
        type: text
        help: Ej. "Queremos escucharte, ponte en contacto con nuestro equipo."

      hablemos_headline:
        label: Sección "Hablemos"
        type: headline

      hablemos_title:
        label: Título
        type: text
        default: "HABLEMOS"
        width: 1/2

      hablemos_text:
        label: Texto de presentación
        type: textarea
        size: small
        help: Ej. "Si tienes cualquier duda..."
        width: 1/2

      hablemos_image:
        label: Ilustración (bocadillos)
        type: files
        multiple: false
        layout: cards
        size: small
        width: 1/1

      emails:
        label: Correos electrónicos
        type: structure
        fields:
          title:
            label: Departamento / Persona
            type: text
            help: P.ej. Psicología, Trabajo Social...
            width: 1/2
          email:
            label: Email
            type: email
            width: 1/2

      phones_headline:
        label: Atención Telefónica
        type: headline

      phones_title:
        label: Título de la sección
        type: text
        default: "Horario de atención telefónica:"

      phone:
        label: Teléfono
        type: tel
        width: 1/2

      phone_schedule:
        label: Horario
        type: textarea
        size: small
        help: Ej. "lunes a viernes de 10:00 a 13:00 h y de 17:00 a 20:00 h"
        width: 1/2

      social_intro:
        label: Texto introductorio a Redes Sociales
        type: text
        default: "O a través de nuestras redes sociales"
        help: Este texto aparecerá antes de los enlaces a redes sociales (configurados en los Ajustes Generales).

      installations_headline:
        label: Instalaciones
        type: headline

      installations_title:
        label: Título de la sección
        type: text
        default: "O VEN A VISITARNOS A NUESTRAS INSTALACIONES"

      addresses:
        label: Direcciones e Instalaciones
        type: structure
        fields:
          image:
            label: Foto de la instalación
            type: files
            multiple: false
            layout: cards
            size: small
            width: 1/4
          title:
            label: Nombre de la sede
            type: text
            help: P.ej. Sede de Apanhem o Piso Asistencial
            width: 1/4
          is_main:
            label: ¿Es la principal?
            type: toggle
            text:
              - "No"
              - "Sí"
            default: false
            help: Se usará en el pie de página
            width: 1/4
          address:
            label: Dirección
            type: textarea
            size: small
            width: 1/2
          schedule:
            label: Horario / Notas
            type: text
            width: 1/2

      google_maps:
        label: Google Maps (Iframe)
        type: textarea
        size: small
        help: 'Pega aquí el código HTML (iframe). NOTA: Para mostrar múltiples ubicaciones con PIN (ej. las dos sedes a la vez), debes crear un mapa en "Google My Maps" (mymaps.google.com) y pegar aquí su código de inserción.'

