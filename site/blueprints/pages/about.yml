title: Sobre Nosotros
icon: info

status:
  draft:
    label: Borrador
  listed:
    label: Publicado

tabs:
  # 1. CONTENIDO INSTITUCIONAL
  content:
    label: Contenido
    icon: text
    columns:
      main:
        width: 2/3
        fields:
          mision:
            label: Nuestra Misión
            type: textarea
            size: small
          vision:
            label: Nuestra Visión
            type: textarea
            size: small
          layout:
            label: Historia y Contenido Detallado
            type: layout
            layouts:
              - "1/1"
              - "1/2, 1/2"
              - "2/3, 1/3"
            fieldsets:
              - text
              - heading
              - image
              - html

      sidebar:
        width: 1/3
        fields:
          cover:
            label: Imagen Principal / Hero
            type: files
            multiple: false
            layout: cards
            size: small
          links:
            label: Enlaces Relacionados
            type: structure
            fields:
              link_text:
                label: Texto del enlace
                type: text
              link_url:
                label: URL
                type: url

  # 2. SEO
  seo: seo/page
